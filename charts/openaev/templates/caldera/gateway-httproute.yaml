{{- if .Values.caldera.gateway.enabled -}}
{{- $fullName := include "openaev.fullname" . -}}
{{- $svcPort := .Values.caldera.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-caldera
  labels:
    {{- include "openaev.labels" . | nindent 4 }}
  {{- with .Values.caldera.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.caldera.gateway.create }}
    - name: {{ $fullName }}-caldera-gateway
      namespace: {{ .Release.Namespace }}
    {{- else }}
    {{- toYaml .Values.caldera.gateway.parentRefs | nindent 4 }}
    {{- end }}
  {{- if .Values.caldera.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.caldera.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.caldera.gateway.rules }}
    - {{- if .matches }}
      matches:
        {{- toYaml .matches | nindent 8 }}
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $fullName }}-caldera
          port: {{ $svcPort }}
    {{- end }}
{{- end }}
